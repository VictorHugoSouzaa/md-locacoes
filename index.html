<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>md-locacoes</title>
  </head>
  <body>
    <div id="app">
      <header class="bg-white border-b-4 border-yellow-400 shadow-sm">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between gap-6">

    <!-- Lado esquerdo: Logo + Menu -->
    <div class="flex items-center gap-8">
      <!-- Logo / Home -->
      <a href="#" class="flex items-center gap-3">
        <img
          src="/logo-md.png"
          alt="M&D Locações"
          class="h-14 w-auto object-contain"
        />
      </a>

      <!-- Botões -->
      <div class="hidden md:flex items-center gap-4">
        <a
          href="#sobre"
          class="text-blue-900 font-bold uppercase text-sm hover:text-blue-600 transition-colors"
        >
          Sobre
        </a>

        <a
          href="#contato"
          class="bg-blue-800 hover:bg-blue-700 text-white font-bold uppercase text-sm px-4 py-2 rounded-lg transition-colors shadow-sm"
        >
          Entre em contato
        </a>
      </div>
    </div>

    <!-- Lado direito: Filtro -->
    <div class="w-full max-w-xs">
      <input
        type="text"
        v-model="filtroProduto"
        placeholder="Filtrar produto..."
        class="w-full px-4 py-2 rounded-lg border border-gray-300 bg-white text-sm text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-700 focus:border-blue-700"
      />
    </div>

  </nav>
</header>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
